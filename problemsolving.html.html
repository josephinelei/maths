<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小老師破奇案 🕵️‍♂️</title>
    <style>
        /* 針對 iPad 優化的排版設計 */
        :root {
            --primary-color: #2c3e50;
            --accent-color: #d35400;
            --pink-card: #ffe4e1;
            --pink-card-border: #ffb6c1;
            --bg-color: #f5f2eb;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: #333;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            -webkit-text-size-adjust: 100%;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            font-size: 2.2em;
            margin-bottom: 5px;
            border-bottom: 4px double var(--primary-color);
            padding-bottom: 15px;
        }

        .instructions {
            text-align: center;
            font-size: 1.2em;
            color: #555;
            margin-bottom: 30px;
        }

        /* 號碼選擇區 */
        .number-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(65px, 1fr));
            gap: 12px;
            margin-bottom: 40px;
        }

        .num-btn {
            background-color: #ecf0f1;
            border: 2px solid #bdc3c7;
            border-radius: 12px;
            font-size: 1.5em;
            font-weight: bold;
            color: var(--primary-color);
            padding: 15px 0;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            /* iPad 觸控優化 */
            touch-action: manipulation;
        }

        .num-btn:active {
            transform: scale(0.95);
        }

        .num-btn.active {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
            box-shadow: inset 0 3px 5px rgba(0,0,0,0.2);
        }

        /* 題目顯示區 */
        #question-display {
            display: none;
            animation: fadeIn 0.4s ease-in-out;
        }

        .question-header {
            font-size: 1.6em;
            font-weight: bold;
            color: var(--accent-color);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }

        .question-icon {
            font-size: 1.5em;
            margin-right: 15px;
        }

        .question-text {
            font-size: 1.4em;
            margin-bottom: 25px;
            text-align: justify;
        }

        /* 粉紅計算卡片 */
        .pink-card {
            background-color: var(--pink-card);
            border: 3px dashed var(--pink-card-border);
            border-radius: 16px;
            height: 350px; /* 大面積預留 */
            position: relative;
            padding: 20px;
            box-sizing: border-box;
            box-shadow: 0 6px 12px rgba(0,0,0,0.08);
            margin-bottom: 25px;
        }

        .pink-card textarea {
            width: 100%;
            height: calc(100% - 60px); /* 留空間給按鈕 */
            background: transparent;
            border: none;
            resize: none;
            font-size: 1.3em;
            font-family: inherit;
            color: #444;
            outline: none;
        }

        .pink-card textarea::placeholder {
            color: #d8969e;
        }

        /* 解題按鈕 */
        .solve-btn {
            position: absolute;
            right: 20px;
            bottom: 20px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 12px 25px;
            font-size: 1.3em;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: all 0.2s;
        }

        .solve-btn:active {
            background-color: #219653;
            transform: scale(0.95);
        }

        /* 標準解題過程區 */
        .solution-box {
            display: none;
            background-color: #e8f4f8;
            border-left: 6px solid #3498db;
            padding: 20px;
            border-radius: 0 8px 8px 0;
            font-size: 1.3em;
            margin-top: 20px;
            animation: slideDown 0.3s ease-out;
        }

        .step { margin-bottom: 10px; }
        .final-ans {
            font-weight: bold;
            color: #c0392b;
            margin-top: 15px;
            font-size: 1.1em;
        }

        .fraction {
            display: inline-block;
            vertical-align: middle;
            text-align: center;
            font-size: 0.9em;
            margin: 0 2px;
        }
        .fraction span { display: block; padding: 0 2px; }
        .fraction span.num { border-bottom: 1px solid #333; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

    </style>
</head>
<body>

<div class="container">
    <h1>小老師破奇案 🕵️‍♂️</h1>
    <p class="instructions">請點擊下方的案件編號，在粉紅色的卡片上計算，最後按「解題」對答案喔！</p>

    <div class="number-grid" id="numberGrid"></div>

    <div id="question-display">
        <div class="question-header">
            <span class="question-icon">🕵️‍♂️</span>
            <span id="q-title">【第 X 題】</span>
        </div>
        <div class="question-text" id="q-text">題目文字載入中...</div>

        <div class="pink-card">
            <textarea placeholder="點擊這裡，將這張粉紅卡片當作你的計算紙寫下過程吧... ✏️"></textarea>
            <button class="solve-btn" id="solveBtn" onclick="toggleSolution()">解題 💡</button>
        </div>

        <div class="solution-box" id="solutionBox"></div>
    </div>
</div>

<script>
    // 34 道題目的資料庫 (已過濾敏感字眼，優化故事情境)
    const questionsData = [
        {
            text: "大偵探在現場發現了一張超市收據，上面寫著：「一打線索卡賣 36 元，嫌疑犯買了半打線索卡和一盒 15 元的放大鏡保護殼。」為了核對嫌疑犯錢包裡的現金額度，請問這張收據的總金額是多少元？",
            steps: ["1. 依據常識，一打是 12 張，半打則是 6 張（即一打的一半）。", "2. 計算半打線索卡的價錢：36 ÷ 2 = 18（元）", "3. 計算總花費金額：18 + 15 = 33（元）"],
            ans: "這張收據的總金額是 33 元。"
        },
        {
            text: "警長把一盒用來記錄指紋的鉛筆平均分給了 6 名探員，每名探員分到 48 枝鉛筆，最後盒子裡還剩下 10 枝。為了清點局裡的資產，請問這盒證物鉛筆原本一共有多少枝？",
            steps: ["1. 先計算分給 6 名探員的鉛筆總數：48 × 6 = 288（枝）", "2. 再加上辦公桌盒內剩下的鉛筆：288 + 10 = 298（枝）"],
            ans: "這盒證物鉛筆原本一共有 298 枝。"
        },
        {
            text: "水果店有 72 個進口蘋果，每 6 個裝成一袋。店員在不知情的情況下已經賣出了 8 袋。大偵探必須立刻查封剩下的蘋果進行搜證，請問還剩下多少袋蘋果需要檢查？",
            steps: ["1. 計算原本的蘋果總共可以裝成多少袋：72 ÷ 6 = 12（袋）", "2. 減去已經賣出的袋數：12 - 8 = 4（袋）"],
            ans: "還剩下 4 袋蘋果需要檢查。"
        },
        {
            text: "嫌疑人小明涉嫌重大案件，大偵探在他身上搜出了 28 元餘款。小明交代說，他出門時帶了 100 元，剛剛去文具店買了 4 本售價相同的加密筆記本。請問每本筆記本的零售價是多少元？",
            steps: ["1. 計算買筆記本一共花掉了多少元：100 - 28 = 72（元）", "2. 計算每本筆記本的單價：72 ÷ 4 = 18（元）"],
            ans: "每本筆記本售 18 元。"
        },
        {
            text: "情報組織在花店搜獲了 85 朵用來傳遞情報的玫瑰花，其中有 10 朵掉在地上受損，其餘的被平均包裝成了 5 束送往總部。如果每束玫瑰的花朵數量都相同，請問每束裡面有多少朵玫瑰？",
            steps: ["1. 計算完好並成功包裝的玫瑰總數：85 - 10 = 75（朵）", "2. 將這些玫瑰平均分成 5 束：75 ÷ 5 = 15（朵）"],
            ans: "每束裡面有 15 朵玫瑰。"
        },
        {
            text: "情報員哥哥手上有 120 張加密書籤，這個數量剛好是弟弟的 3 倍。如果弟弟為了配合大偵探搜證，緊急拿出了 5 張書籤給警方做對比，請問弟弟現在手裡還剩下多少張加密書籤？",
            steps: ["1. 先算出弟弟原本擁有的書籤數量：120 ÷ 3 = 40（張）", "2. 減去交給警方的數量：40 - 5 = 35（張）"],
            ans: "弟弟還剩下 35 張加密書籤。"
        },
        {
            text: "特工小麗正在執行長途追蹤任務，她需要購買 8 瓶特製能量水。商店裡整箱 24 瓶售價 120 元。如果商店允許零售，且每瓶價格相同，請問小麗買這 8 瓶果汁應該付多少元？",
            steps: ["1. 計算單瓶能量水的售價：120 ÷ 24 = 5（元）", "2. 計算 8 瓶的總價：5 × 8 = 40（元）"],
            ans: "小麗應該付 40 元。"
        },
        {
            text: "警方包圍了一家未經授權的地下晶片工廠。根據內部資料，這家工廠的機器 4 小時可以生產 800 個追蹤器零件。按此速度，他們要完成 1200 個零件的訂單來出貨，請問需要開機運作多少小時？",
            steps: ["1. 計算機器每小時能生產的零件數：800 ÷ 4 = 200（個）", "2. 計算生產 1200 個零件所需的時間：1200 ÷ 200 = 6（小時）"],
            ans: "需要開機運作 6 小時。"
        },
        {
            text: "大偵探截獲了一批犯罪分子用來偽裝的糖果盒。一大包裝的糖果有 45 粒，這個數量是小包裝的 3倍。大偵探在現場一共搜獲了 5 包小包裝的糖果，請問這 5 包裡面共有多少粒糖果？",
            steps: ["1. 先計算一包小包裝糖果的數量：45 ÷ 3 = 15（粒）", "2. 計算 5 包小包裝的總和：15 × 5 = 75（粒）"],
            ans: "這 5 包裡面共有 75 粒糖果。"
        },
        {
            text: "私家偵探陳先生帶了 50 元去文具店採購偵查筆。店內正舉行促銷：這種筆每支 8 元，買 5 支送 1 支。請問陳先生用這 50 元最多可以得到多少支筆？還會剩下多少元？",
            steps: ["1. 計算 50 元直接購買可以買到多少支：50 ÷ 8 = 6（支）…… 餘 2（元）", "2. 檢查贈送條件：因為「買 5 支送 1 支」，他買了 6 支，已經滿足送 1 支的條件。", "3. 計算總得到的筆數：6 + 1 = 7（支）"],
            ans: "最多可得到 7 支筆，還剩下 2 元。"
        },
        {
            text: "小華在嫌疑書店買了 2 本涉嫌抄襲的偵探小說，他付給店員 100 元。大偵探在櫃檯查到，這款小說「3 本共售 75 元」。請問店員應該找回給小華多少元，好讓大偵探核對收銀機的帳目？",
            steps: ["1. 先算出一本小說的單價：75 ÷ 3 = 25（元）", "2. 計算買 2 本需要付的金額：25 × 2 = 50（元）", "3. 計算店員應找回的金額：100 - 50 = 50（元）"],
            ans: "店員應該找回 50 元。"
        },
        {
            text: "兩名小偷在密室裡一邊分贓一邊吃午餐。小紅吃了 <div class='fraction'><span class='num'>3</span><span>8</span></div> 個大薄餅，小明吃了 <div class='fraction'><span class='num'>2</span><span>8</span></div> 個大薄餅。請問他們兩人一共吃了多少個大薄餅？",
            steps: ["1. 同分母分數相加，分母不變，分子相加。", "2. 計算：3/8 + 2/8 = 5/8（個）"],
            ans: "他們兩人一共吃了 5/8 個大薄餅。"
        },
        {
            text: "（接上題）大偵探破門而入時，兩名小偷已經逃跑。大偵探需要記錄現場留下的食物證物。如果原本只有一個完整的大薄餅，而且他們兩人剛才一共吃了 <div class='fraction'><span class='num'>5</span><span>8</span></div> 個，請問現場還剩下多少個大薄餅？",
            steps: ["1. 將一個完整的大薄餅看作整體「1」，即 8/8。", "2. 用整體減去吃掉的分數：8/8 - 5/8 = 3/8（個）"],
            ans: "現場還剩下 3/8 個大薄餅。"
        },
        {
            text: "實驗室的水箱裡原本裝有 <div class='fraction'><span class='num'>9</span><span>10</span></div> 升的特殊化學顯影水。嫌犯在潛入時用去了 <div class='fraction'><span class='num'>4</span><span>10</span></div> 升。為了提取足夠的殘留樣本，請問此時水箱裡還剩多少升化學顯影水？",
            steps: ["1. 分數相減算式：9/10 - 4/10 = 5/10（升）", "2. 將分數化成最簡分數：5/10 = 1/2（升）"],
            ans: "此時水箱裡還剩 1/2 升化學顯影水。"
        },
        {
            text: "大偵探為了防止水箱乾涸，往裡面重新注入了 <div class='fraction'><span class='num'>3</span><span>10</span></div> 升的清水。已知裡面原本剩下 <div class='fraction'><span class='num'>5</span><span>10</span></div> 升殘留液。請問此時水箱裡一共有多少升液體？",
            steps: ["1. 將原本剩下的 5/10 升加上新注入的 3/10 升。", "2. 計算：5/10 + 3/10 = 8/10（升）", "3. 約化成分數：8/10 = 4/5（升）"],
            ans: "此時水箱裡一共有 4/5 升液體。"
        },
        {
            text: "嫌犯沿著一個長方形的秘密植物園邊緣逃跑並留下了鞋印。大偵探測量出這個植物園的長是 25 米，寬比長短 10 米。嫌犯沿邊緣跑了一整圈，請問這個植物園的周界是多少米？",

            ans: "這個植物園的周界是 80 米。"
        },
        {
            text: "怪盜用一根長 256 厘米的特製導線，在走廊上圍成了 4 個大小完全相同的正方形防盜紅外線網。大偵探需要跨越它們，請問每個正方形防盜網的邊長是多少厘米？",

        },

        },
        {
            text: "保險箱表面彈出了第二道幾何防禦網，是一個不規則的階梯形圖形。總寬度為 12 cm，總高度為 8 cm。請運用平移法算出，這道幾何機關圖形的總周界是多少厘米？",

        {

            text: "為了看清嫌犯大樓內部的動向，身高 1.45 米的特工小剛站在一張 0.3 米高的木凳上進行觀測。請問此時小剛的頭頂部距離地面多少米？",

        },
        {
            text: "大偵探正在跟蹤一名偽裝成家庭主婦的犯罪嫌疑人。她在菜市場買菜作為掩護，花了 45.8 元買魚，12.5 元買有機蔬菜。請問這位嫌疑人一共花了多少元？",

        {
            text: "犯罪現場的一支監聽筆原本外接導線長 15.5 厘米，被犯人用剪刀破壞、剪去了一段後，還剩下 8.7 厘米。請問被剪去（用去）的那一段導線長多少厘米？",
            steps: ["1. 運用小數減法，用原長度減去剩下的長度。", "2. 計算：15.5 - 8.7 = 6.8（厘米）"],

    // 初始化號碼網格
    const grid = document.getElementById('numberGrid');
    const questionDisplay = document.getElementById('question-display');
    const qTitle = document.getElementById('q-title');
    const qText = document.getElementById('q-text');
    const solutionBox = document.getElementById('solutionBox');
    const solveBtn = document.getElementById('solveBtn');
    
    let currentQuestionIndex = -1;

    for (let i = 0; i < questionsData.length; i++) {
        const btn = document.createElement('button');
        btn.className = 'num-btn';
        btn.innerText = i + 1;
        btn.onclick = () => loadQuestion(i, btn);
        grid.appendChild(btn);
    }

    function loadQuestion(index, btnElement) {
        // 重置所有按鈕樣式
        document.querySelectorAll('.num-btn').forEach(b => b.classList.remove('active'));
        btnElement.classList.add('active');

        currentQuestionIndex = index;
        const qData = questionsData[index];

        // 載入題目資料
        qTitle.innerText = `案件 ${index + 1}`;
        qText.innerHTML = qData.text;
        
        // 清空粉紅卡片的文字並隱藏解答
        document.querySelector('.pink-card textarea').value = '';
        solutionBox.style.display = 'none';
        solveBtn.innerText = '解題 💡';

        // 顯示題目區塊
        questionDisplay.style.display = 'block';
        
        // 讓畫面平滑滾動到題目區
        questionDisplay.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function toggleSolution() {
        if (solutionBox.style.display === 'block') {
            solutionBox.style.display = 'none';
            solveBtn.innerText = '解題 💡';
        } else {
            const qData = questionsData[currentQuestionIndex];
            
            // 構建標準解答 HTML
            let htmlContent = '<strong>【標準解題過程】</strong><br><br>';
            qData.steps.forEach(step => {
                htmlContent += `<div class="step">${step}</div>`;
            });
            htmlContent += `<div class="final-ans">答：${qData.ans}</div>`;
            
            solutionBox.innerHTML = htmlContent;
            solutionBox.style.display = 'block';
            solveBtn.innerText = '收起解答 🙈';
        }
    }
</script>
